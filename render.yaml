services:
  - type: web
    name: grafux-devices
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn devices_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: AGENT_TOKEN
        generateValue: true
      # OpenClaw runtime — Anthropic key used to run and scaffold claws.
      # sync:false => set the secret value in the Render dashboard, not in the repo.
      - key: ANTHROPIC_API_KEY
        sync: false
