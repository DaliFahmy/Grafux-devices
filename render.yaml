services:
  - type: web
    name: grafux-devices
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn devices_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: AGENT_TOKEN
        generateValue: true
      # OpenClaw runtime — Anthropic key used to run and scaffold claws.
      # sync:false => set the secret value in the Render dashboard, not in the repo.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Composio key — used by the claw connections REST calls (list / send-message
      # actions). The MCP server URL itself is self-authenticating, so this is only
      # needed for the inbound-reply / management paths. Set it in the dashboard.
      - key: COMPOSIO_API_KEY
        sync: false
      # RunPod key — used by the GPU runtime to provision pods and SSH in. With this
      # set, the user can create a gpu block and connect with no per-block key. Set
      # the secret value in the Render dashboard.
      - key: RUNPOD_API_KEY
        sync: false
      # Ephemeral GPU lifecycle (default on): terminate the pod the instant a run
      # finishes so a GPU only costs money while it is actually compiling/running
      # (idle cost $0; the block re-provisions automatically on the next Run). Set
      # to 0 to keep pods warm between runs (create-once/run-many) instead.
      - key: GPU_EPHEMERAL
        value: "1"
      # Idle reaper backstop: terminate a provisioned-but-never-run GPU pod after
      # this many minutes idle, so a forgotten pod cannot bill forever. Ephemeral
      # runs already self-terminate; this only catches Regenerate-and-walk-away
      # pods (and warm pods when GPU_EPHEMERAL=0). Set to 0 to disable.
      - key: GPU_IDLE_TIMEOUT_MIN
        value: "10"
      # How long (seconds) to wait for a freshly-created pod to come up with a
      # public SSH endpoint. Large CUDA -devel images take minutes to pull on a
      # cold machine, so this is generous; raise it if Regenerate times out.
      - key: GPU_PROVISION_TIMEOUT
        value: "600"
